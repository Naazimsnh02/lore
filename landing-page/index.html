<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORE — The World Is Your Documentary</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #080706; overflow-x: hidden; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LORE_STYLES = `
          @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Syne:wght@400;600;700;800&display=swap');

          * { box-sizing: border-box; margin: 0; padding: 0; }

          :root {
            --black: #080706;
            --deep: #0d0b09;
            --amber: #c8922a;
            --amber-dim: #8a621c;
            --gold: #e8c86e;
            --cream: #f2ead8;
            --fog: #b8ab94;
            --charcoal: #1a1714;
            --charcoal2: #252119;
            --rust: #8b3a1e;
            --film: rgba(200,146,42,0.06);
          }

          body { background: var(--black); color: var(--cream); font-family: 'Syne', sans-serif; }

          .grain {
            position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 128px;
          }

          @keyframes fadeUp {
            from { opacity: 0; transform: translateY(32px); }
            to { opacity: 1; transform: translateY(0); }
          }
          @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
          @keyframes float {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
          }
          @keyframes waveform {
            0%,100% { height: 4px; }
            50% { height: 20px; }
          }
          @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
        `;

        const GrainOverlay = () => <div className="grain" />;

        const NAV_SECTIONS = ["Concept", "Modes", "Experience", "Architecture", "Stack"];

        function Navbar({ active, onNav }) {
          return (
            <nav style={{
              position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
              display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "20px 48px",
              background: "linear-gradient(to bottom, rgba(8,7,6,0.95), transparent)",
              backdropFilter: "blur(12px)",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{
                  width: 32, height: 32, borderRadius: "50%",
                  background: "radial-gradient(circle at 35% 35%, #e8c86e, #c8922a, #5a3a0a)",
                  boxShadow: "0 0 20px rgba(200,146,42,0.5)",
                  animation: "float 4s ease-in-out infinite"
                }} />
                <span style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 22, fontWeight: 300, letterSpacing: 6, color: "#e8c86e" }}>   
                  LORE
                </span>
              </div>
              <div style={{ display: "flex", gap: 32 }}>
                {NAV_SECTIONS.map(s => (
                  <button key={s} onClick={() => onNav(s)}
                    style={{
                      background: "none", border: "none", cursor: "pointer",
                      fontFamily: "'Syne', sans-serif", fontSize: 11, letterSpacing: 3,
                      textTransform: "uppercase",
                      color: active === s ? "#c8922a" : "#b8ab94",
                      transition: "color 0.3s",
                      borderBottom: active === s ? "1px solid #c8922a" : "1px solid transparent",
                      paddingBottom: 2
                    }}
                  >{s}</button>
                ))}
              </div>
              <div style={{
                fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#8a621c", letterSpacing: 2
              }}>LORE v1.0 — LIVE AGENT</div>
            </nav>
          );
        }

        function Hero({ onNav }) {
          const [typed, setTyped] = useState("");
          const phrases = [
            "Point at the Colosseum...",
            "Ask about the 1918 pandemic...",
            "Stand where empires fell...",
            "Hear the voices of history...",
          ];
          const [pIdx, setPIdx] = useState(0);

          useEffect(() => {
            let i = 0;
            let dir = 1;
            let current = phrases[pIdx];
            const interval = setInterval(() => {
              if (dir === 1) {
                setTyped(current.slice(0, i));
                i++;
                if (i > current.length) { dir = -1; setTimeout(() => {}, 1200); }
              } else {
                setTyped(current.slice(0, i));
                i--;
                if (i < 0) {
                  dir = 1; i = 0;
                  setPIdx(p => (p + 1) % phrases.length);
                  current = phrases[(pIdx + 1) % phrases.length];
                }
              }
            }, 55);
            return () => clearInterval(interval);
          }, [pIdx]);

          return (
            <section id="Concept" style={{
              minHeight: "100vh", display: "flex", flexDirection: "column",
              alignItems: "center", justifyContent: "center",
              position: "relative", overflow: "hidden",
              background: "radial-gradient(ellipse 80% 60% at 50% 60%, #1a100400, #080706)",
              paddingTop: 100
            }}>
              <div style={{
                position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)",
                width: 2, height: "45%",
                background: "linear-gradient(to bottom, rgba(200,146,42,0.6), transparent)",
                filter: "blur(8px)"
              }} />
              <div style={{
                position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)",
                width: 300, height: "55%",
                background: "radial-gradient(ellipse at top, rgba(200,146,42,0.12), transparent 70%)",
              }} />

              <div style={{ textAlign: "center", position: "relative", zIndex: 2, animation: "fadeUp 1.2s ease both" }}>
                <div style={{
                  fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: 6,
                  color: "#c8922a", textTransform: "uppercase", marginBottom: 32
                }}>
                  ◆ &nbsp; Gemini Live Agent Challenge &nbsp; ◆
                </div>

                <h1 style={{
                  fontFamily: "'Cormorant Garamond', serif", fontWeight: 300,
                  fontSize: "clamp(80px, 14vw, 160px)", lineHeight: 0.9,
                  letterSpacing: -2, color: "#f2ead8",
                  textShadow: "0 0 80px rgba(200,146,42,0.3)"
                }}>
                  LORE
                </h1>

                <div style={{
                  fontFamily: "'Cormorant Garamond', serif", fontStyle: "italic",
                  fontSize: "clamp(18px, 3vw, 28px)", color: "#c8922a",
                  marginTop: 8, marginBottom: 48, fontWeight: 300, letterSpacing: 4
                }}>
                  The World Is Your Documentary
                </div>

                <div style={{
                  fontFamily: "'DM Mono', monospace", fontSize: 14,
                  color: "#b8ab94", height: 24, letterSpacing: 1
                }}>
                  {typed}<span style={{ animation: "blink 1s infinite", color: "#c8922a" }}>|</span>
                </div>

                <p style={{
                  maxWidth: 560, margin: "40px auto 0",
                  fontFamily: "'Syne', sans-serif", fontSize: 15, lineHeight: 1.8,
                  color: "#8a7a62", fontWeight: 400
                }}>
                  Point your camera at any place. Speak any question. LORE generates a
                  living documentary — narrated, illustrated, cinematic — in real time.
                  History has never been this immersive.
                </p>

                <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 48 }}>
                  <button onClick={() => onNav("Modes")} style={{
                    padding: "14px 36px", background: "#c8922a", border: "none",
                    fontFamily: "'Syne', sans-serif", fontSize: 11, letterSpacing: 3,
                    textTransform: "uppercase", color: "#080706", cursor: "pointer",
                    fontWeight: 700, transition: "all 0.3s",
                  }}>
                    Explore Modes
                  </button>
                  <button onClick={() => onNav("Architecture")} style={{
                    padding: "14px 36px", background: "transparent",
                    border: "1px solid rgba(200,146,42,0.4)",
                    fontFamily: "'Syne', sans-serif", fontSize: 11, letterSpacing: 3,
                    textTransform: "uppercase", color: "#c8922a", cursor: "pointer",
                    transition: "all 0.3s",
                  }}>
                    View Architecture
                  </button>
                </div>
              </div>

              <div style={{
                position: "absolute", bottom: 0, left: 0, right: 0, height: 200,
                background: "linear-gradient(transparent, #080706)"
              }} />
            </section>
          );
        }

        const MODES = [
          {
            id: "sight",
            icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
            name: "SightMode",
            origin: "Visual Intelligence",
            color: "#c8922a",
            tagline: "Point. See. Understand.",
            description: "Your camera becomes a portal into history. Point at any monument or building and LORE instantly recognises it via Gemini Live vision and GPS grounding. It begins generating a narrated documentary with high-fidelity illustrations streaming in real time.",
            steps: [
              { icon: "📷", label: "Camera captures live frames (1fps)" },
              { icon: "🌍", label: "GPS context grounds the model" },
              { icon: "🎙️", label: "Gemini Live streams narration" },
              { icon: "🖼️", label: "Gemini 3.1 Flash Image generates imagery" },
            ],
            example: '"You are standing where 40,000 soldiers fought in 1764. The ground beneath you absorbed the blood of three empires..."',    
            uniqueFeature: "LIVE VISION — Continuous multimodal recognition fused with authoritative historical data."
          },
          {
            id: "voice",
            icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>,
            name: "VoiceMode",
            origin: "Conversational DNA",
            color: "#7a9e7e",
            tagline: "Speak. Ask. Receive a film.",
            description: "Speak any topic and receive a fully interleaved documentary — narration, generated illustrations, and cinematic video clips — flowing together as a single coherent stream. Interrupt at any time to ask follow-up questions.",
            steps: [
              { icon: "🎙️", label: "User speaks natural question" },
              { icon: "🧠", label: "Gemini Live API orchestrates tools" },
              { icon: "🖼️", label: "Gemini 3.1 Flash Image generates images" },
              { icon: "🎞️", label: "Veo 3.1 generates cinematic clips" },
            ],
            example: '"It began not with a crash, but a whisper. In 2003, a banker in Connecticut created a product that would — in five years — bring the world to its knees..."',
            uniqueFeature: "INSTANT DOCS — Transform any spoken topic into a cinematic narrative with no preparation."
          },
          {
            id: "lore",
            icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
            name: "LoreMode",
            origin: "The Fusion ✧",
            color: "#e8c86e",
            tagline: "See + Ask = Something New.",
            description: "The ultimate breakthrough: Camera AND voice simultaneously. LORE sees where you are AND hears your question — then generates a response that fuses both. This unlocks Alternate History scenarios grounded in your real location.",
            steps: [
              { icon: "📷", label: "Camera streams visual context" },
              { icon: "🗣️", label: "Voice question adds intent" },
              { icon: "⚡", label: "Gemini fuses both inputs" },
              { icon: "✨", label: "Reality + imagination combined" },
            ],
            example: '"Standing at the Colosseum, you ask: what if Rome never fell? LORE generates an alternate-history film shot against your real backdrop."',
            uniqueFeature: "ALTERNATE HISTORY — Ground any historical 'what if?' in the real place you're standing for maximum immersive impact."
          },
          {
            id: "gps",
            icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
            name: "GPS Walking Tour",
            origin: "Spatial Awareness",
            color: "#7a9e9e",
            tagline: "Walk. Discover. Listen.",
            description: "Experience the history of your city as you walk through it. LORE tracks your position and auto-triggers narrations when you move significantly or approach a landmark. Includes full Google Directions navigation.",
            steps: [
              { icon: "📍", label: "GPS tracks real-time location" },
              { icon: "🗺️", label: "Maps SDK identifies landmarks" },
              { icon: "↪️", label: "Directions API guides your path" },
              { icon: "🎙️", label: "Auto-triggers on significant movement" },
            ],
            example: '"As you approach the fountain, notice the marks on the central pillar. These were left during the Great Fire of 1888..."',
            uniqueFeature: "HANDS-FREE DISCOVERY — The world narrates itself to you as you move, with landmarks automatically appearing on your map."
          }
        ];

        function ModesSection() {
          const [active, setActive] = useState(0);
          const m = MODES[active];

          return (
            <section id="Modes" style={{ minHeight: "100vh", padding: "120px 48px", background: "var(--deep)" }}>
              <div style={{ maxWidth: 1100, margin: "0 auto" }}>
                <div style={{ marginBottom: 64 }}>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: 4, color: "#c8922a", marginBottom: 16 }}>        
                    02 — MODES
                  </div>
                  <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 56, fontWeight: 300, color: "#f2ead8" }}>
                    Four inputs.<br />One living documentary.
                  </h2>
                </div>

                <div style={{ display: "flex", gap: 0, marginBottom: 48, borderBottom: "1px solid rgba(200,146,42,0.15)" }}>
                  {MODES.map((mode, i) => (
                    <button key={mode.id} onClick={() => setActive(i)} style={{
                      flex: 1, padding: "20px 24px", background: "none",
                      border: "none", cursor: "pointer",
                      borderBottom: active === i ? `2px solid ${mode.color}` : "2px solid transparent",
                      transition: "all 0.3s",
                      color: active === i ? mode.color : "#4a4035"
                    }}>
                      <div style={{ marginBottom: 10, display: "flex", justifyContent: "center" }}>
                        {mode.icon}
                      </div>
                      <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 13, fontWeight: 700, letterSpacing: 2, color: active === i ? mode.color : "#8a7a62" }}>
                        {mode.name}
                      </div>
                      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: 2, marginTop: 4 }}>
                        {mode.origin}
                      </div>
                    </button>
                  ))}
                </div>

                <div key={active} style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 48 }}>       
                  <div>
                    <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 32, fontStyle: "italic", color: m.color, marginBottom: 24 }}>
                      {m.tagline}
                    </div>
                    <p style={{ fontFamily: "'Syne', sans-serif", fontSize: 15, color: "#b8ab94", lineHeight: 1.8, marginBottom: 32 }}>
                      {m.description}
                    </p>

                    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                      {m.steps.map((step, i) => (
                        <div key={i} style={{ display: "flex", alignItems: "center", gap: 16 }}>
                          <div style={{
                            width: 40, height: 40, borderRadius: "50%",
                            background: `${m.color}18`,
                            border: `1px solid ${m.color}30`,
                            display: "flex", alignItems: "center", justifyContent: "center",
                            fontSize: 16, flexShrink: 0
                          }}>{step.icon}</div>
                          <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 13, color: "#b8ab94", letterSpacing: 1 }}>
                            {step.label}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                    <div style={{
                      background: "#0d0b09", border: `1px solid ${m.color}20`,
                      padding: 28, position: "relative", overflow: "hidden"
                    }}>
                      <div style={{
                        position: "absolute", top: 0, left: 0, right: 0, height: 1,
                        background: `linear-gradient(to right, transparent, ${m.color}, transparent)`
                      }} />
                      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: m.color, letterSpacing: 3, marginBottom: 16 }}>       
                        ▶ SAMPLE NARRATION OUTPUT
                      </div>
                      <div style={{
                        fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontStyle: "italic",
                        color: "#d4c8b0", lineHeight: 1.7
                      }}>
                        {m.example}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 3, marginTop: 20 }}>
                        {Array.from({ length: 24 }).map((_, i) => (
                          <div key={i} style={{
                            width: 3, background: m.color, borderRadius: 2,
                            opacity: 0.6,
                            animation: `waveform ${0.4 + Math.random() * 0.8}s ease-in-out infinite`,
                            animationDelay: `${Math.random() * 0.5}s`,
                            minHeight: 4, maxHeight: 24
                          }} />
                        ))}
                      </div>
                    </div>

                    <div style={{
                      background: `${m.color}0a`,
                      border: `1px solid ${m.color}25`,
                      padding: 24
                    }}>
                      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, color: m.color, letterSpacing: 3, marginBottom: 12 }}>       
                        ✦ SIGNATURE FEATURE
                      </div>
                      <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 13, color: "#d4c8b0", lineHeight: 1.6 }}>
                        {m.uniqueFeature}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          );
        }

        const FEATURES = [
          {
            icon: "🧠",
            title: "Gemini Live API",
            desc: "Native multimodal interaction. Gemini hears your voice and sees your camera frames in a single bidirectional stream for sub-second responses.",
            tag: "Live Intelligence"
          },
          {
            icon: "📽️",
            title: "Google Maps Platform",
            desc: "Places API and Directions API provide the ground truth for your location, ensuring every historical claim is tied to the exact coordinates you stand upon.",
            tag: "Spatial Grounding"
          },
          {
            icon: "🎞️",
            title: "Veo 3.1 & Gemini 3.1",
            desc: "Cinematic video and high-fidelity illustrations generated on-the-fly to visualize historical events, architectural reconstructions, and alternate futures.",
            tag: "Generative Media"
          },
          {
            icon: "🎙️",
            title: "Historical Characters",
            desc: "At significant landmarks, LORE narrations shift into dramatic interpretations of the people who shaped history, bringing voices from the past into the present.",
            tag: "Persona Engine"
          },
          {
            icon: "🌍",
            title: "Alternate History",
            desc: "Ask 'What if?' and watch the world transform. Speculative scenarios are grounded in physical visual context through generative fusion.",
            tag: "Lore Exclusive"
          },
          {
            icon: "⚡",
            title: "Direct Multimodal Flow",
            desc: "A streamlined transparent proxy coordinates between the mobile app and Gemini Live API to ensure zero-friction documentary generation.",
            tag: "High-Performance Bridge"
          }
        ];

        function ExperienceSection() {
          return (
            <section id="Experience" style={{ minHeight: "100vh", padding: "120px 48px", background: "#080706" }}>
              <div style={{ maxWidth: 1100, margin: "0 auto" }}>
                <div style={{ marginBottom: 64 }}>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: 4, color: "#c8922a", marginBottom: 16 }}>        
                    03 — EXPERIENCE
                  </div>
                  <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 56, fontWeight: 300, color: "#f2ead8" }}>
                    Features that emerge<br />from the fusion.
                  </h2>
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 2 }}>
                  {FEATURES.map((f, i) => (
                    <div key={i} style={{
                      padding: 32, background: "#0d0b09",
                      border: "1px solid rgba(200,146,42,0.08)",
                      transition: "all 0.3s", cursor: "default"
                    }}>
                      <div style={{ fontSize: 28, marginBottom: 16 }}>{f.icon}</div>
                      <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 14, fontWeight: 700, color: "#f2ead8", marginBottom: 12, letterSpacing: 0.5 }}>
                        {f.title}
                      </div>
                      <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 13, color: "#7a6e5c", lineHeight: 1.7, marginBottom: 20 }}>       
                        {f.desc}
                      </div>
                      <div style={{
                        display: "inline-block",
                        fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: 2,
                        color: "#c8922a", borderTop: "1px solid rgba(200,146,42,0.2)",

                      }}>
                        {f.tag}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          );
        }

        function ArchitectureSection() {
          return (
            <section id="Architecture" style={{ minHeight: "100vh", padding: "120px 48px", background: "var(--deep)" }}>
              <div style={{ maxWidth: 1100, margin: "0 auto" }}>
                <div style={{ marginBottom: 64 }}>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: 4, color: "#c8922a", marginBottom: 16 }}>        
                    04 — ARCHITECTURE
                  </div>
                  <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 56, fontWeight: 300, color: "#f2ead8" }}>
                    How LORE thinks.
                  </h2>
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 64, alignItems: "start" }}>
                  <div style={{ padding: 32, background: "#080706", border: "1px solid rgba(200,146,42,0.1)", borderRadius: 8 }}>
                    <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 12, color: "#c8922a", marginBottom: 24 }}>
                      SYSTEM TOPOLOGY
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                      <div style={{ padding: 12, background: "#1a1714", border: "1px solid #c8922a50", textAlign: "center", fontSize: 12 }}>Flutter Mobile (Frontend)</div>
                      <div style={{ height: 20, width: 1, background: "#c8922a50", margin: "0 auto" }}></div>
                      <div style={{ padding: 12, background: "#1a1714", border: "1px solid #c8922a50", textAlign: "center", fontSize: 12 }}>Gemini Live Proxy (Port 8090)</div>
                      <div style={{ display: "flex", justifyContent: "space-between", padding: "0 40px" }}>
                        <div style={{ height: 40, width: 1, background: "#c8922a50" }}></div>
                        <div style={{ height: 40, width: 1, background: "#c8922a50" }}></div>
                        <div style={{ height: 40, width: 1, background: "#c8922a50" }}></div>
                      </div>
                      <div style={{ display: "flex", gap: 10 }}>
                        <div style={{ flex: 1, padding: 8, background: "#0d0b09", border: "1px solid #7a9e7e50", textAlign: "center", fontSize: 10 }}>Gemini Live API</div>
                        <div style={{ flex: 1, padding: 8, background: "#0d0b09", border: "1px solid #c8922a50", textAlign: "center", fontSize: 10 }}>Image Server (Port 8091)</div>
                        <div style={{ flex: 1, padding: 8, background: "#0d0b09", border: "1px solid #e8c86e50", textAlign: "center", fontSize: 10 }}>Video Server (Port 8092)</div>
                      </div>
                      <div style={{ height: 20, width: "100%", border: "1px solid #c8922a20", borderBottom: "none" }}></div>
                      <div style={{ padding: 12, background: "#1a1714", border: "1px solid #c8922a50", textAlign: "center", fontSize: 12 }}>Google Cloud Stack (Vertex AI, Cloud Run)</div>

                  </div>

                  <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                    {[
                      { step: "01", title: "Multimodal Capture", detail: "Real-time camera frames and audio stream via WebSocket to the Gemini Live Proxy. Vision and voice are processed concurrently." },
                      { step: "02", title: "Spatial Grounding", detail: "GPS coordinates and reverse-geocoding provide the location context, ensuring narration is grounded in physical reality." },
                      { icon: "03", title: "Tool Call Orchestration", detail: "Gemini Live API triggers generate_image and generate_video tools, which are executed by the specialized backend servers." },
                      { step: "04", title: "Real-time Delivery", detail: "Interleaved content is streamed back to the mobile app for an immersive, zero-friction documentary experience." },
                    ].map((item) => (
                      <div key={item.title} style={{ display: "flex", gap: 20 }}>
                        <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#c8922a", width: 32, flexShrink: 0 }}>{item.step || item.icon}</div>
                        <div>
                          <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 14, fontWeight: 700, color: "#f2ead8", marginBottom: 8 }}>{item.title}</div>
                          <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 13, color: "#7a6e5c", lineHeight: 1.7 }}>{item.detail}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>
          );
        }

        const STACK = [
          { category: "LIVE INTELLIGENCE", items: [
            { name: "Gemini 2.5 Flash Live", role: "Native Audio: vision + audio + session memory", badge: "PRIMARY" },
          ]},
          { category: "GENERATION LAYER", items: [
            { name: "Veo 3.1", role: "1080p cinematic video generation", badge: "VIDEO" },
            { name: "Gemini 3.1 Flash Image", role: "Rapid high-fidelity image generation", badge: "IMAGE" },
          ]},
          { category: "SPATIAL & NAVIGATION", items: [
            { name: "Google Directions API", role: "Walking navigation for GPS Walking Tours", badge: "NAV" },
            { name: "Google Maps SDK", role: "Landmark visualization and route rendering", badge: "MAP" },      
          ]},
          { category: "INFRASTRUCTURE", items: [
            { name: "Google Cloud Run", role: "Serverless compute hosting the proxy and generation servers", badge: "COMPUTE" },
          ]},
        ];

        function StackSection() {
          return (
            <section id="Stack" style={{ minHeight: "100vh", padding: "120px 48px 160px", background: "#080706" }}>
              <div style={{ maxWidth: 1100, margin: "0 auto" }}>
                <div style={{ marginBottom: 64 }}>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: 4, color: "#c8922a", marginBottom: 16 }}>        
                    05 — TECH STACK
                  </div>
                  <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 56, fontWeight: 300, color: "#f2ead8" }}>
                    Built with the full<br />Google Gemini stack.
                  </h2>
                </div>

                <div style={{ display: "flex", flexDirection: "column", gap: 40 }}>
                  {STACK.map((cat) => (
                    <div key={cat.category}>
                      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 9, letterSpacing: 4, color: "#4a3e2a", marginBottom: 16, borderBottom: "1px solid rgba(200,146,42,0.08)", paddingBottom: 12 }}>
                        {cat.category}
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                        {cat.items.map((item) => (
                          <div key={item.name} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 20px", background: "#0d0b09", border: "1px solid rgba(200,146,42,0.06)", gap: 24 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 20, flex: 1 }}>
                              <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, padding: "3px 8px", background: "#c8922a18", border: "1px solid #c8922a30", color: "#c8922a", letterSpacing: 2 }}>{item.badge}</div>
                              <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 13, fontWeight: 600, color: "#d4c8b0" }}>{item.name}</div>
                            </div>
                            <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 12, color: "#5a5040", textAlign: "right" }}>{item.role}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{ marginTop: 100, textAlign: "center", borderTop: "1px solid rgba(200,146,42,0.1)", paddingTop: 60 }}>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 48, fontWeight: 300, color: "#f2ead8", lineHeight: 1.2 }}>   
                    The world has always had stories.
                  </div>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 48, fontStyle: "italic", fontWeight: 300, color: "#c8922a", lineHeight: 1.2 }}>
                    LORE just learned to tell them.
                  </div>
                  <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#4a3e2a", letterSpacing: 4, marginTop: 32 }}>
                    LORE — GEMINI LIVE AGENT CHALLENGE 2026
                  </div>
                </div>
              </div>
            </section>
          );
        }

        function LoreLandingPage() {
          const [activeSection, setActiveSection] = useState("Concept");

          const scrollTo = (section) => {
            setActiveSection(section);
            const el = document.getElementById(section);
            if (el) el.scrollIntoView({ behavior: "smooth" });
          };

          useEffect(() => {
            const style = document.createElement("style");
            style.textContent = LORE_STYLES;
            document.head.appendChild(style);
            return () => document.head.removeChild(style);
          }, []);

          return (
            <div style={{ background: "#080706", minHeight: "100vh" }}>
              <GrainOverlay />
              <Navbar active={activeSection} onNav={scrollTo} />
              <Hero onNav={scrollTo} />
              <ModesSection />
              <ExperienceSection />
              <ArchitectureSection />
              <StackSection />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LoreLandingPage />);
    </script>
</body>
</html>
